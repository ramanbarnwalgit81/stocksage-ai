    - data:
        code: "import json\n\ndef main(**kwargs):\n    raw = kwargs.get('raw', '{}')\n\
          \    ticker = str(kwargs.get('ticker', 'STOCK')).strip()\n\n    try:\n \
          \       data = json.loads(raw)\n        q = data.get('Global Quote', {})\n\
          \n        symbol  = q.get('01. symbol', ticker)\n        open_p  = q.get('02.\
          \ open', '0')\n        high    = q.get('03. high', '0')\n        low   \
          \  = q.get('04. low', '0')\n        price   = q.get('05. price', '0')\n\
          \        volume  = q.get('06. volume', '0')\n        change  = q.get('09.\
          \ change', '0')\n        chg_pct = q.get('10. change percent', '0%')\n\n\
          \        prev = str(round(float(price) - float(change), 2))\n        direction\
          \ = 'UP' if float(change) >= 0 else 'DOWN'\n\n        if int(volume) > 0:\n\
          \            vol_fmt = str(round(int(volume) / 1e6, 2)) + 'M shares'\n \
          \       else:\n            vol_fmt = 'N/A'\n\n        result = (\n     \
          \       'LATEST MARKET DATA FOR ' + symbol + '\\n'\n            '===================================\\\
          n'\n            'Last Price:      $' + str(price) + '\\n'\n            'Day\
          \ Change:      ' + str(change) + ' (' + str(chg_pct) + ')\\n'\n        \
          \    'Direction:       ' + direction + '\\n'\n            'Day High:   \
          \     $' + str(high) + '\\n'\n            'Day Low:         $' + str(low)\
          \ + '\\n'\n            'Open:            $' + str(open_p) + '\\n'\n    \
          \        'Prev Close:      $' + str(prev) + '\\n'\n            'Volume:\
          \          ' + vol_fmt + '\\n'\n            'Day Range:       $' + str(low)\
          \ + ' — $' + str(high) + '\\n'\n            'Note: Shows last trading session\
          \ data (Friday close on weekends)\\n'\n        )\n        return {'parsed_quote':\
          \ result}\n\n    except Exception as e:\n        return {\n            'parsed_quote':\
          \ 'Parse error: ' + str(e) + '\\nRaw: ' + str(raw)[:300]\n        }"
        code_language: python3
        outputs:
          parsed_quote:
            children: null
            type: string
