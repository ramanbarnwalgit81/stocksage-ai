            Rules:

            - Return ONLY the ticker symbol in uppercase, nothing else

            - If the user says ''Apple'', return AAPL

            - If the user says ''Tesla'', return TSLA

            - If the user says ''Microsoft'', return MSFT

            - If they give the ticker directly (e.g. NVDA), return it as-is

            - If you cannot identify a stock, return: UNKNOWN

            - Never add explanations, just the ticker'
